<!DOCTYPE html>
<html>
<head>
    <title>Student Productivity Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: white;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #1e293b;
            padding: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
        }

        .container {
            padding: 30px;
        }

        .card {
            background-color: #1e293b;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        h2 {
            margin-top: 0;
            color: #38bdf8;
        }

        ul {
            padding-left: 20px;
        }

        li {
            margin-bottom: 8px;
        }

        .goal {
            color: #22c55e;
        }
    </style>
</head>
<body>

    <header>
        🚀 Student Productivity Dashboard
    </header>

    <div class="container">

        <div class="card">
            <h2>Today's Tasks</h2>
            <ul>
                <li>Complete Physics revision</li>
                <li>Practice Maths problems</li>
                <li>Work on coding project</li>
            </ul>
        </div>

        <div class="card">
    <h2>Study Timer</h2>
    <h3 id="timer">25:00</h3>
    <button onclick="startTimer()">Start</button>
    <button onclick="resetTimer()">Reset</button>
</div>

        <div class="card">
            <h2>Goals for 2026</h2>
            <ul class="goal">
                <li>Participate in 5 Hackathons</li>
                <li>Build 5 Projects</li>
                <li>Learn Full Stack Development</li>
            </ul>
        </div>

    </div>

<script>
    let time = 1500; // 25 minutes in seconds
    let interval;

    function updateDisplay() {
        let minutes = Math.floor(time / 60);
        let seconds = time % 60;
        seconds = seconds < 10 ? "0" + seconds : seconds;
        document.getElementById("timer").innerText = minutes + ":" + seconds;
    }

    function startTimer() {
        if (!interval) {
            interval = setInterval(() => {
                if (time > 0) {
                    time--;
                    updateDisplay();
                }
            }, 1000);
        }
    }

    function resetTimer() {
        clearInterval(interval);
        interval = null;
        time = 1500;
        updateDisplay();
    }

    updateDisplay();
</script>
</body>
</html>
