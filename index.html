<!DOCTYPE html>
<html>
<head>
    <title>Student Productivity Dashboard</title>
    <style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
        margin: 0;
        padding: 0;
    }

    header {
        padding: 25px;
        text-align: center;
        font-size: 32px;
        font-weight: bold;
        letter-spacing: 1px;
    }

    .container {
        max-width: 700px;
        margin: auto;
        padding: 20px;
    }

    .card {
        background-color: #1e293b;
        padding: 25px;
        margin-bottom: 25px;
        border-radius: 16px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        transition: transform 0.2s ease;
    }

    .card:hover {
        transform: translateY(-5px);
    }

    h2 {
        margin-top: 0;
        color: #38bdf8;
    }

    ul {
        padding-left: 20px;
    }

    li {
        margin-bottom: 10px;
    }

    #timer {
        font-size: 40px;
        margin: 15px 0;
        color: #22c55e;
    }

    button {
        padding: 10px 20px;
        margin-right: 10px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        background-color: #38bdf8;
        color: black;
        transition: 0.2s ease;
    }

    button:hover {
        background-color: #0ea5e9;
        transform: scale(1.05);
    }

    .streak {
        font-size: 20px;
        color: #facc15;
        font-weight: bold;
    }
</style>
</head>
<body>

    <header>
        🚀 Student Productivity Dashboard
    </header>

    <div class="container">

        <div class="card">
            <h2>Today's Tasks</h2>
            <ul>
                <li>Complete Physics revision</li>
                <li>Practice Maths problems</li>
                <li>Work on coding project</li>
            </ul>
        </div>

        <div class="card">
    <h2>Study Timer</h2>
    <h3 id="timer">25:00</h3>
    <button onclick="startTimer()">Start</button>
    <button onclick="resetTimer()">Reset</button>
    <p class="streak">🔥 Current Streak: <span id="streak">0</span></p>
</div>

        <div class="card">
            <h2>Goals for 2026</h2>
            <ul class="goal">
                <li>Participate in 5 Hackathons</li>
                <li>Build 5 Projects</li>
                <li>Learn Full Stack Development</li>
            </ul>
        </div>

    </div>

<script>
    let time = 10;
    let interval;
    let streak = 0;

    function updateDisplay() {
        let minutes = Math.floor(time / 60);
        let seconds = time % 60;
        seconds = seconds < 10 ? "0" + seconds : seconds;
        document.getElementById("timer").textContent = minutes + ":" + seconds;
    }

    function startTimer() {
        if (!interval) {
            interval = setInterval(() => {
                if (time > 0) {
                    time--;
                    updateDisplay();
                } else {
                    clearInterval(interval);
                    interval = null;
                    streak++;
                    document.getElementById("streak").textContent = streak;
                    alert("🔥 Session Complete! Streak Increased!");
                }
            }, 1000);
        }
    }

    function resetTimer() {
        clearInterval(interval);
        interval = null;
        time = 1500;
        updateDisplay();
    }

    updateDisplay();
</script>
