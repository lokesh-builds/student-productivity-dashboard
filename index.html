<!DOCTYPE html>
<html>
<head>
    <title>Student Productivity Dashboard</title>
    <style>
        input {
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-right: 10px;
        }
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
        margin: 0;
        padding: 0;
    }

    header {
        padding: 25px;
        text-align: center;
        font-size: 32px;
        font-weight: bold;
        letter-spacing: 1px;
    }

    .container {
        max-width: 700px;
        margin: auto;
        padding: 20px;
    }

    .card {
        background-color: #1e293b;
        padding: 25px;
        margin-bottom: 25px;
        border-radius: 16px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        transition: transform 0.2s ease;
    }

    .card:hover {
        transform: translateY(-5px);
    }

    h2 {
        margin-top: 0;
        color: #38bdf8;
    }

    ul {
        padding-left: 20px;
    }

    li {
        margin-bottom: 10px;
    }

    #timer {
        font-size: 40px;
        margin: 15px 0;
        color: #22c55e;
    }

    button {
        padding: 10px 20px;
        margin-right: 10px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        background-color: #38bdf8;
        color: black;
        transition: 0.2s ease;
    }

    button:hover {
        background-color: #0ea5e9;
        transform: scale(1.05);
    }

    .streak {
        font-size: 20px;
        color: #facc15;
        font-weight: bold;
    }
</style>
</head>
<body>

    <header>
        🚀 Student Productivity Dashboard
    </header>

    <div class="container">

        <div class="card">
            <h2>Today's Tasks</h2>

            <input id="taskInput" placeholder="Enter a new task" />
            <button onclick="addTask()">Add Task</button>

            <ul id="taskList"></ul>
        </div>

        <div class="card">
    <h2>Study Timer</h2>
    <h3 id="timer">25:00</h3>
    <button onclick="startTimer()">Start</button>
    <button onclick="resetTimer()">Reset</button>
    <p class="streak">🔥 Current Streak: <span id="streak">0</span></p>
</div>

        <div class="card">
            <h2>Goals for 2026</h2>
            <ul class="goal">
                <li>Participate in 5 Hackathons</li>
                <li>Build 5 Projects</li>
                <li>Learn Full Stack Development</li>
            </ul>
        </div>

    </div>

<script>
    let time = 10;
    let interval;
    let streak = localStorage.getItem("streak") 
    ? parseInt(localStorage.getItem("streak")) 
    : 0;
    function updateDisplay() {
        let minutes = Math.floor(time / 60);
        let seconds = time % 60;
        seconds = seconds < 10 ? "0" + seconds : seconds;
        document.getElementById("timer").textContent = minutes + ":" + seconds;
        document.getElementById("streak").textContent = streak;
    }

    function startTimer() {
        if (!interval) {
            interval = setInterval(() => {
                if (time > 0) {
                    time--;
                    updateDisplay();
                } else {
                    clearInterval(interval);
                    interval = null;
                    streak++;
                    localStorage.setItem("streak", streak);
                    document.getElementById("streak").textContent = streak;
                    alert("🔥 Session Complete! Streak Increased!");
                }
            }, 1000);
        }
    }

    function resetTimer() {
        clearInterval(interval);
        interval = null;
        time = 1500;
        updateDisplay();
    }

    updateDisplay();
    function addTask() {
    const input = document.getElementById("taskInput");
    const taskText = input.value;

    if (taskText === "") return;

    const li = document.createElement("li");

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";

    checkbox.addEventListener("change", () => {
        if (checkbox.checked) {
            li.style.textDecoration = "line-through";
            streak++;
            document.getElementById("streak").textContent = streak;
            localStorage.setItem("streak", streak);
        } else {
            li.style.textDecoration = "none";
        }
        saveTasks();
    });

    const span = document.createElement("span");
    span.textContent = " " + taskText;

    li.appendChild(checkbox);
    li.appendChild(span);

    document.getElementById("taskList").appendChild(li);

    saveTasks();
    input.value = "";
}

function saveTasks() {
    const tasks = [];

    document.querySelectorAll("#taskList li").forEach(li => {
        const text = li.querySelector("span").textContent.trim();
        const completed = li.querySelector("input").checked;

        tasks.push({ text, completed });
    });

    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function loadTasks() {
    const saved = JSON.parse(localStorage.getItem("tasks")) || [];

    saved.forEach(task => {
        const li = document.createElement("li");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = task.completed;

        const span = document.createElement("span");
        span.textContent = " " + task.text;

        if (task.completed) {
            li.style.textDecoration = "line-through";
        }

        checkbox.addEventListener("change", () => {
            if (checkbox.checked) {
                li.style.textDecoration = "line-through";
                streak++;
                document.getElementById("streak").textContent = streak;
                localStorage.setItem("streak", streak);
            } else {
                li.style.textDecoration = "none";
            }
            saveTasks();
        });

        li.appendChild(checkbox);
        li.appendChild(span);

        document.getElementById("taskList").appendChild(li);
    });
}
</script>
